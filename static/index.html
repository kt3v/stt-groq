<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STT Groq</title>
<style>
*{margin:0;box-sizing:border-box}
body{font:16px/1.6 system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:min(520px,90vw);display:flex;flex-direction:column;gap:16px;align-items:center;text-align:center}
select{background:transparent;border:none;color:#8b949e;font:inherit;font-size:.85rem;cursor:pointer;padding:0;appearance:none;-webkit-appearance:none}
select:focus{outline:none}
select option{background:#0d1117;color:#e6edf3}
#out{width:100%;min-height:180px;background:transparent;border:none;color:#e6edf3;font:inherit;font-size:1.05rem;resize:none;line-height:1.7;caret-color:#58a6ff}
#out:focus{outline:none}
#out::placeholder{color:#30363d}
.row{display:flex;gap:8px}
button{padding:10px 24px;border:none;border-radius:8px;font:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s}
button:active{opacity:.7}
button:disabled{opacity:.3;cursor:not-allowed}
#rec{background:#238636;color:#fff}
#rec.recording{background:#da3633}
#copy{background:#21262d;color:#8b949e}
#status{font-size:.8rem;color:#484f58}
/* LLM bar */
#llm-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;padding-top:12px;border-top:1px solid #21262d}
#add-form{display:none;flex-direction:column;gap:8px;width:100%}
#new-prompt{width:100%;min-height:80px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font:inherit;font-size:.9rem;padding:8px;resize:none;text-align:left}
#new-prompt:focus{outline:none;border-color:#58a6ff}
#new-prompt::placeholder{color:#484f58}
#save-prompt{background:#238636;color:#fff;padding:8px 20px}
#cancel-prompt{background:#21262d;color:#8b949e;padding:8px 20px}
.llm-btn{background:#21262d;color:#8b949e;padding:8px 16px;border-radius:20px;font-size:.85rem;font-weight:500;border:none;cursor:pointer;transition:opacity .15s,border-color .15s,color .15s}
.llm-btn:hover{opacity:.85}
.add-btn{background:transparent;border:1px dashed #30363d;color:#484f58;padding:6px 14px}
.add-btn:hover{border-color:#58a6ff;color:#58a6ff;opacity:1}
.prompt-wrapper{position:relative;display:inline-flex}
.del{display:none;position:absolute;top:-6px;right:-6px;background:#da3633;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;line-height:16px;text-align:center;cursor:pointer;user-select:none;z-index:1}
.prompt-wrapper:hover .del{display:block}
/* Password modal */
#pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:100}
#pw-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px 28px;display:flex;flex-direction:column;gap:14px;width:min(300px,90vw);text-align:center}
#pw-box h2{font-size:.95rem;font-weight:600;color:#8b949e;margin:0}
#pw-input{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font:inherit;font-size:1rem;padding:10px 14px;width:100%;text-align:center;letter-spacing:.1em}
#pw-input:focus{outline:none;border-color:#58a6ff}
#pw-submit{background:#238636;color:#fff;width:100%;padding:10px}
#pw-error{color:#f85149;font-size:.8rem;min-height:1em}
</style>
</head>
<body>

<div id="pw-modal">
  <div id="pw-box">
    <h2>Enter Password</h2>
    <form id="pw-form">
      <input id="pw-input" type="password" autocomplete="current-password" autofocus>
      <div id="pw-error"></div>
      <button id="pw-submit" type="submit">Unlock</button>
    </form>
  </div>
</div>

<div class="wrap">
  <select id="lang"></select>
  <textarea id="out" placeholder="Your transcription will appear here…"></textarea>
  <div id="status">Ready</div>
  <div class="row">
    <button id="rec">Record</button>
    <button id="copy" disabled>Copy</button>
  </div>
  <div id="add-form">
    <textarea id="new-prompt" placeholder="Enter prompt for text correction…"></textarea>
    <div class="row" style="justify-content:flex-end">
      <button id="cancel-prompt">Cancel</button>
      <button id="save-prompt">Save</button>
    </div>
  </div>
  <div id="llm-bar">
    <button id="add-prompt" class="llm-btn add-btn">+</button>
  </div>
</div>
<script>
const rec = document.getElementById('rec');
const out = document.getElementById('out');
const copy = document.getElementById('copy');
const status = document.getElementById('status');
const lang = document.getElementById('lang');
const llmBar = document.getElementById('llm-bar');
const addPromptBtn = document.getElementById('add-prompt');
const addForm = document.getElementById('add-form');
const newPromptTA = document.getElementById('new-prompt');
const savePromptBtn = document.getElementById('save-prompt');
const cancelPromptBtn = document.getElementById('cancel-prompt');
const pwModal = document.getElementById('pw-modal');
const pwForm = document.getElementById('pw-form');
const pwInput = document.getElementById('pw-input');
const pwError = document.getElementById('pw-error');

const LANGUAGES = [
  ['auto', 'Auto'],
  ['en', 'English'],
  ['ru', 'Slavic'],
  ['de', 'Deutsch'],
  ['fr', 'Français'],
  ['es', 'Español'],
  ['zh', 'Chinese'],
  ['ja', 'Japanese'],
  ['ar', 'Arabic'],
];
LANGUAGES.forEach(([code, label]) => {
  const opt = document.createElement('option');
  opt.value = code;
  opt.textContent = label;
  lang.appendChild(opt);
});
lang.value = localStorage.getItem('stt_lang') || 'auto';
lang.onchange = () => localStorage.setItem('stt_lang', lang.value);

// ── Auth ──────────────────────────────────────────────────────────────────────
let sessionToken = localStorage.getItem('stt_token') || '';
let authVerified = false;

const authReadyPromise = (async () => {
  try {
    const headers = sessionToken ? {'X-Session-Token': sessionToken} : {};
    const r = await fetch('/api/auth/status', {headers});
    if (r.ok) { authVerified = true; return; }
  } catch (_) {}
  sessionToken = '';
  localStorage.removeItem('stt_token');
})();

function ensureAuth() {
  return authReadyPromise.then(() => {
    if (authVerified) return true;
    return new Promise(resolve => {
      pwModal.style.display = 'flex';
      pwInput.value = '';
      pwError.textContent = '';
      setTimeout(() => pwInput.focus(), 0);

      pwForm.onsubmit = async e => {
        e.preventDefault();
        pwError.textContent = '';
        try {
          const r = await fetch('/api/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: pwInput.value}),
          });
          if (r.ok) {
            const j = await r.json();
            sessionToken = j.token;
            if (sessionToken) localStorage.setItem('stt_token', sessionToken);
            authVerified = true;
            pwModal.style.display = 'none';
            resolve(true);
          } else {
            pwError.textContent = 'Wrong password';
            pwInput.select();
          }
        } catch (_) {
          pwError.textContent = 'Network error';
        }
      };
    });
  });
}

function authHeaders() {
  return sessionToken ? {'X-Session-Token': sessionToken} : {};
}
// ─────────────────────────────────────────────────────────────────────────────

let mediaRec = null, chunks = [];

rec.onclick = async () => {
  if (!mediaRec) {
    chunks = [];
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    mediaRec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      mediaRec = null;
      rec.textContent = 'Record';
      rec.classList.remove('recording');
      rec.disabled = true;

      if (!(await ensureAuth())) { rec.disabled = false; status.textContent = 'Ready'; return; }

      status.textContent = 'Processing...';
      const blob = new Blob(chunks, {type:'audio/webm'});
      const fd = new FormData();
      fd.append('file', blob, 'audio.webm');
      fd.append('language', lang.value);

      try {
        const r = await fetch('/api/transcribe', {method:'POST', headers: authHeaders(), body:fd});
        const j = await r.json();
        out.value = j.text || '';
        copy.disabled = !out.value;
      } catch(e) {
        out.value = 'Error: ' + e.message;
      } finally {
        status.textContent = 'Ready';
        rec.disabled = false;
      }
    };
    mediaRec.start();
    rec.textContent = 'Stop';
    rec.classList.add('recording');
    status.textContent = 'Recording...';
  } else {
    mediaRec.stop();
  }
};

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !rec.disabled && document.activeElement !== out && document.activeElement !== newPromptTA && pwModal.style.display === 'none') {
    e.preventDefault();
    rec.click();
  }
});

copy.onclick = () => {
  navigator.clipboard.writeText(out.value).then(() => {
    copy.textContent = 'Copied!';
    setTimeout(() => copy.textContent = 'Copy', 1200);
  });
};

// LLM prompt buttons

function makePromptButton(p) {
  const wrapper = document.createElement('div');
  wrapper.className = 'prompt-wrapper';

  const btn = document.createElement('button');
  btn.className = 'llm-btn';
  btn.textContent = p.label;
  btn.onclick = async () => {
    const text = out.value.trim();
    if (!text) return;

    if (!(await ensureAuth())) return;

    status.textContent = 'Correcting…';
    btn.disabled = true;
    try {
      const r = await fetch('/api/correct', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', ...authHeaders()},
        body: JSON.stringify({text, prompt: p.prompt}),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t); }
      const j = await r.json();
      if (j.text) { out.value = j.text; copy.disabled = false; }
    } catch(e) {
      status.textContent = 'Error';
      setTimeout(() => status.textContent = 'Ready', 2000);
      return;
    } finally {
      btn.disabled = false;
    }
    status.textContent = 'Ready';
  };

  const del = document.createElement('span');
  del.className = 'del';
  del.textContent = '×';
  del.onclick = async () => {
    await fetch(`/api/prompts/${p.id}`, {method: 'DELETE'});
    wrapper.remove();
  };

  wrapper.appendChild(btn);
  wrapper.appendChild(del);
  return wrapper;
}

async function loadPrompts() {
  try {
    const r = await fetch('/api/prompts');
    const prompts = await r.json();
    prompts.forEach(p => llmBar.appendChild(makePromptButton(p)));
  } catch(e) {}
}

loadPrompts(); // async, doesn't block page load

addPromptBtn.onclick = () => {
  addForm.style.display = 'flex';
  newPromptTA.focus();
};

cancelPromptBtn.onclick = () => {
  addForm.style.display = 'none';
  newPromptTA.value = '';
};

savePromptBtn.onclick = async () => {
  const promptText = newPromptTA.value.trim();
  if (!promptText) return;
  try {
    const r = await fetch('/api/prompts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: promptText}),
    });
    if (!r.ok) throw new Error(await r.text());
    const p = await r.json();
    llmBar.appendChild(makePromptButton(p));
    addForm.style.display = 'none';
    newPromptTA.value = '';
  } catch(e) {}
};
</script>
</body>
</html>
